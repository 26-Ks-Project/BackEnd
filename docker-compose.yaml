services:
  # 1. 스마트팜 사령탑 (Spring Boot API)
  smart-farm-api:
    build: .
    container_name: smart-farm-api
    restart: always
    ports:
      # 외부 포트는 .env에서 관리하세 (예: 8080 또는 8081)
      - "${SERVER_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${DB_NAME}?serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MQTT_BROKER_URL=${MQTT_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql-db
      - mosquitto

  # 2. 데이터 금고 (MySQL)
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    ports:
      # 포트 충돌 방지를 위해 .env에서 3307 등으로 설정 가능하네
      - "${DB_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql

  # 3. 데이터 우체국 (MQTT Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      # 에러 방지를 위해 '폴더' 단위로 연결하는 게 정석일세!
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # 4. 영상 방송국 (MediaMTX)
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    ports:
      - "1935:1935" # RTMP (입력용)
      - "8888:8888" # HLS (출력용)

volumes:
  mysql_data: